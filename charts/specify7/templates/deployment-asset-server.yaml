{{- if not (eq .Values.assetServer.enabled false) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "specify7.fullname" . }}-asset-server
  labels:
    {{- include "specify7.labels" . | nindent 4 }}
    component: asset-server
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "specify7.selectorLabels" . | nindent 6 }}
      component: asset-server
  template:
    metadata:
      labels:
        {{- include "specify7.selectorLabels" . | nindent 8 }}
        component: asset-server
      annotations:
        checksum/asset-server-settings: {{ include (print $.Template.BasePath "/configmap-asset-server-settings.yaml") . | sha256sum }}
    spec:
      {{- if not (eq (include "specify7.assetServerS3Enabled" .) "true") }}
      initContainers:
        - name: volume-permissions
          image: {{ include "specify7.volumePermissionsImage" . | quote }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              chown -R 999:999 /home/specify/attachments
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: attachments
              mountPath: /home/specify/attachments
              {{- if .Values.persistence.mainSubPath }}
              subPath: {{ .Values.persistence.mainSubPath }}/attachments
              {{- end }}
      {{- end }}
      containers:
        - name: asset-server
          image: "{{ .Values.assetServer.image.repository }}:{{ .Values.assetServer.image.tag | default "latest" }}"
          imagePullPolicy: {{ .Values.assetServer.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SERVER_NAME
              value: {{ include "specify7.assetServerServerName" . | quote }}
            - name: SERVER_PORT
              value: "8080"
            - name: DEBUG_MODE
              value: "false"
          {{- if not .Values.secrets.existingSecret }}
            - name: ATTACHMENT_KEY
              value: {{ .Values.specify.attachmentKey | quote }}
          {{- end }}
          {{- if .Values.secrets.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.existingSecret }}
          {{- end }}
          volumeMounts:
            {{- if eq (include "specify7.assetServerS3Enabled" .) "true" }}
            - name: asset-server-settings
              mountPath: /home/specify/settings.py
              subPath: settings.py
            {{- else }}
            - name: attachments
              mountPath: /home/specify/attachments
              {{- if .Values.persistence.mainSubPath }}
              subPath: {{ .Values.persistence.mainSubPath }}/attachments
              {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.assetServer.resources | nindent 12 }}
      volumes:
        {{- if eq (include "specify7.assetServerS3Enabled" .) "true" }}
        - name: asset-server-settings
          configMap:
            name: {{ include "specify7.fullname" . }}-asset-server-settings
        {{- else }}
        - name: attachments
          persistentVolumeClaim:
            claimName: {{ if .Values.persistence.existingClaim }}{{ .Values.persistence.existingClaim }}{{ else }}{{ include "specify7.fullname" . }}-attachments{{ end }}
        {{- end }}
{{- end }}
