{{- if .Values.migrationHarness.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "specify7.fullname" . }}-migration-harness
  labels:
    {{- include "specify7.labels" . | nindent 4 }}
    component: migration-harness
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "specify7.selectorLabels" . | nindent 6 }}
      component: migration-harness
  template:
    metadata:
      labels:
        {{- include "specify7.selectorLabels" . | nindent 8 }}
        component: migration-harness
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migration-harness
          image: "{{ .Values.migrationHarness.image.repository }}:{{ .Values.migrationHarness.image.tag }}"
          imagePullPolicy: {{ .Values.migrationHarness.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.migrationHarness.service.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          env:
            - name: DB_HOST
              value: {{ if .Values.mariadb.enabled }}{{ include "specify7.fullname" . }}-mariadb{{ else }}{{ .Values.specify.database.host | quote }}{{ end }}
            - name: DB_PORT
              value: {{ .Values.specify.database.port | quote }}
            - name: DB_NAME
              value: {{ .Values.mariadb.auth.database | quote }}
            - name: DB_USER
              value: {{ .Values.mariadb.auth.username | quote }}
            - name: HARNESS_PORT
              value: {{ .Values.migrationHarness.service.port | quote }}
            - name: HARNESS_BASE_PATH
              value: {{ .Values.migrationHarness.basePath | quote }}
            - name: HARNESS_DEFAULT_COLLECTION
              value: {{ .Values.migrationHarness.defaultCollection | quote }}
            - name: HARNESS_DEFAULT_ORACLE_ENV
              value: {{ .Values.migrationHarness.defaultOracleEnv | quote }}
          {{- if .Values.secrets.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.existingSecret }}
          {{- end }}
          resources:
            {{- toYaml .Values.migrationHarness.resources | nindent 12 }}
{{- end }}
