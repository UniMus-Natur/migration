apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "specify7.fullname" . }}-backend
  labels:
    {{- include "specify7.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "specify7.selectorLabels" . | nindent 6 }}
      component: backend
  template:
    metadata:
      labels:
        {{- include "specify7.selectorLabels" . | nindent 8 }}
        component: backend
      annotations:
        {{- include "specify7.configChecksumAnnotation" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      
      initContainers:
        - name: volume-permissions
          image: {{ include "specify7.volumePermissionsImage" . | quote }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              chown -R 999:999 /volumes
              chmod a+rx /volumes
              chmod -R a+rX /volumes/static-files /volumes/webpack-output || true
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: shared-assets
              mountPath: /volumes
              {{- if .Values.persistence.mainSubPath }}
              subPath: {{ .Values.persistence.mainSubPath }}
              {{- end }}
        - name: asset-extractor
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/bash
            - -c
            - |
              echo "Extracting static assets to shared volume..."
              mkdir -p /volumes/static-files
              mkdir -p /volumes/webpack-output
              mkdir -p /volumes/specify-config
              cp -r /opt/specify7/specifyweb/static/* /volumes/static-files/
              if [ -d "/opt/specify7/specifyweb/frontend/static" ]; then
                cp -r /opt/specify7/specifyweb/frontend/static/* /volumes/webpack-output/
              fi
              cp -r /opt/specify7/config/* /volumes/specify-config/
              chmod -R a+rX /volumes/static-files /volumes/webpack-output /volumes/specify-config
              echo "Extraction complete."
          volumeMounts:
            - name: shared-assets
              mountPath: /volumes
              {{- if .Values.persistence.mainSubPath }}
              subPath: {{ .Values.persistence.mainSubPath }}
              {{- end }}

      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # command: ["/bin/bash", "-c"]
          # args:
          #   - |
          #      # Ensure database is reachable
          #      echo "Waiting for database..."
          #      # (Optional: add wait-for-it or similar logic here)
          #      
          #      # Run Specify
          #      # Note: Official image CMD might be different, but we override to ensure correct settings binding
          #      exec gunicorn -b 0.0.0.0:8000 specifyweb.wsgi
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          startupProbe:
            {{- toYaml .Values.backend.startupProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.backend.readinessProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.backend.livenessProbe | nindent 12 }}
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: "specifyweb.settings"
            - name: SPECIFY_CONFIG_DIR
              value: "/opt/specify7/config"
            - name: REDIS_HOST
              value: {{ include "specify7.redisHost" . | quote }}
            - name: CELERY_BROKER_URL
              value: {{ printf "redis://%s/0" (include "specify7.redisHost" .) | quote }}
            - name: CELERY_RESULT_BACKEND
              value: {{ printf "redis://%s/1" (include "specify7.redisHost" .) | quote }}
            - name: WEB_CONCURRENCY
              value: "4"
            - name: DATABASE_HOST
              {{- if .Values.mariadb.enabled }}
              value: "{{ .Release.Name }}-mariadb"
              {{- else }}
              value: "$(DB_HOST)"
              {{- end }}
            - name: DATABASE_PORT
              {{- if .Values.mariadb.enabled }}
              value: "3306"
              {{- else }}
              value: "$(DB_PORT)"
              {{- end }}
            - name: DATABASE_NAME
              {{- if .Values.mariadb.enabled }}
              value: "{{ .Values.mariadb.auth.database }}"
              {{- else }}
              value: "$(DB_NAME)"
              {{- end }}
            - name: MASTER_NAME
              {{- if .Values.mariadb.enabled }}
              value: "{{ .Values.mariadb.auth.username }}"
              {{- else }}
              value: "$(DB_USER)"
              {{- end }}
            - name: MASTER_PASSWORD
              {{- if .Values.mariadb.enabled }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mariadb.auth.existingSecret }}
                  key: mariadb-password
              {{- else }}
              value: "$(DB_PASSWORD)"
              {{- end }}
            - name: MYSQL_ROOT_PASSWORD
              {{- if .Values.mariadb.enabled }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mariadb.auth.existingSecret }}
                  key: mariadb-root-password
              {{- else }}
              value: "$(DB_PASSWORD)"
              {{- end }}
            - name: APP_USER_NAME
              {{- if .Values.mariadb.enabled }}
              value: "{{ .Values.mariadb.auth.username }}"
              {{- else }}
              value: "$(DB_USER)"
              {{- end }}
            - name: APP_USER_PASSWORD
              {{- if .Values.mariadb.enabled }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mariadb.auth.existingSecret }}
                  key: mariadb-password
              {{- else }}
              value: "$(DB_PASSWORD)"
              {{- end }}
          {{- if .Values.secrets.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.existingSecret }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /opt/specify7/specifyweb/settings/local_specify_settings.py
              subPath: local_specify_settings.py
            - name: config
              mountPath: /opt/specify7/specifyweb/settings/secret_key.py
              subPath: secret_key.py
            - name: config
              mountPath: /opt/specify7/specifyweb/settings/debug.py
              subPath: debug.py
            - name: shared-assets
              mountPath: /volumes
              {{- if .Values.persistence.mainSubPath }}
              subPath: {{ .Values.persistence.mainSubPath }}
              {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

      volumes:
        - name: config
          secret:
            secretName: {{ include "specify7.fullname" . }}-config
        - name: shared-assets
          persistentVolumeClaim:
            claimName: {{ if .Values.persistence.existingClaim }}{{ .Values.persistence.existingClaim }}{{ else }}{{ include "specify7.fullname" . }}-shared-assets{{ end }}
