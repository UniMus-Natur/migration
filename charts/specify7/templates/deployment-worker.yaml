apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "specify7.fullname" . }}-worker
  labels:
    {{- include "specify7.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "specify7.selectorLabels" . | nindent 6 }}
      component: worker
  template:
    metadata:
      labels:
        {{- include "specify7.selectorLabels" . | nindent 8 }}
        component: worker
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: volume-permissions
          image: public.ecr.aws/bitnami/bitnami-shell:11-debian-11-r102
          command: ["/bin/bash", "-c"]
          args:
            - |
              chown -R 999:999 /volumes
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: shared-assets
              mountPath: /volumes
              {{- if .Values.persistence.mainSubPath }}
              subPath: {{ .Values.persistence.mainSubPath }}
              {{- end }}
      containers:
        - name: worker
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # command: ["/bin/bash", "-c"]
          # args: ... removed to use default image entrypoint
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: "specifyweb.settings"
            - name: SPECIFY_CONFIG_DIR
              value: "/opt/specify7/config"
            - name: REDIS_HOST
              value: {{ .Release.Name }}-redis-master
            - name: DATABASE_HOST
              {{- if .Values.mariadb.enabled }}
              value: "{{ .Release.Name }}-mariadb"
              {{- else }}
              value: "$(DB_HOST)"
              {{- end }}
            - name: DATABASE_PORT
              {{- if .Values.mariadb.enabled }}
              value: "3306"
              {{- else }}
              value: "$(DB_PORT)"
              {{- end }}
            - name: DATABASE_NAME
              {{- if .Values.mariadb.enabled }}
              value: "{{ .Values.mariadb.auth.database }}"
              {{- else }}
              value: "$(DB_NAME)"
              {{- end }}
            - name: MASTER_NAME
              {{- if .Values.mariadb.enabled }}
              value: "{{ .Values.mariadb.auth.username }}"
              {{- else }}
              value: "$(DB_USER)"
              {{- end }}
            - name: MASTER_PASSWORD
              {{- if .Values.mariadb.enabled }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mariadb.auth.existingSecret }}
                  key: mariadb-password
              {{- else }}
              value: "$(DB_PASSWORD)"
              {{- end }}
            - name: MYSQL_ROOT_PASSWORD
              {{- if .Values.mariadb.enabled }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mariadb.auth.existingSecret }}
                  key: mariadb-root-password
              {{- else }}
              value: "$(DB_PASSWORD)"
              {{- end }}
            - name: APP_USER_NAME
              {{- if .Values.mariadb.enabled }}
              value: "{{ .Values.mariadb.auth.username }}"
              {{- else }}
              value: "$(DB_USER)"
              {{- end }}
            - name: APP_USER_PASSWORD
              {{- if .Values.mariadb.enabled }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mariadb.auth.existingSecret }}
                  key: mariadb-password
              {{- else }}
              value: "$(DB_PASSWORD)"
              {{- end }}
          {{- if .Values.secrets.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.existingSecret }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /opt/specify7/specifyweb/settings/local_specify_settings.py
              subPath: local_specify_settings.py
            - name: config
              mountPath: /opt/specify7/specifyweb/settings/secret_key.py
              subPath: secret_key.py
            - name: config
              mountPath: /opt/specify7/specifyweb/settings/debug.py
              subPath: debug.py
            - name: shared-assets
              mountPath: /volumes
              {{- if .Values.persistence.mainSubPath }}
              subPath: {{ .Values.persistence.mainSubPath }}
              {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

      volumes:
        - name: config
          secret:
            secretName: {{ include "specify7.fullname" . }}-config
        - name: shared-assets
          persistentVolumeClaim:
            claimName: {{ if .Values.persistence.existingClaim }}{{ .Values.persistence.existingClaim }}{{ else }}{{ include "specify7.fullname" . }}-shared-assets{{ end }}
