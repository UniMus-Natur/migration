{{- if and .Values.prefect.enabled .Values.prefect.server.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "specify7.fullname" . }}-prefect-server
  labels:
    {{- include "specify7.labels" . | nindent 4 }}
    component: prefect-server
spec:
  podSelector:
    matchLabels:
      {{- include "specify7.selectorLabels" . | nindent 6 }}
      component: prefect-server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 4200
{{- end }}
