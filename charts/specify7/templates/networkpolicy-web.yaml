    {{- include "specify7.labels" . | nindent 4 }}
    component: migration-harness
spec:
  podSelector:
    matchLabels:
      {{- include "specify7.selectorLabels" . | nindent 6 }}
      component: migration-harness
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- if .Values.networkPolicy.allowAllNamespaces }}
        - namespaceSelector: {}
        {{- else if .Values.networkPolicy.allowedNamespaceNames }}
        {{- range .Values.networkPolicy.allowedNamespaceNames }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
        {{- end }}
        {{- else }}
        - podSelector: {}
        {{- end }}
      ports:
