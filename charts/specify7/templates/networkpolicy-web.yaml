---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "specify7.fullname" . }}-asset-server-internal
  labels:
    {{- include "specify7.labels" . | nindent 4 }}
    component: asset-server
spec:
  podSelector:
    matchLabels:
      {{- include "specify7.selectorLabels" . | nindent 6 }}
      component: asset-server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "specify7.selectorLabels" . | nindent 14 }}
              component: backend
        - podSelector:
            matchLabels:
              {{- include "specify7.selectorLabels" . | nindent 14 }}
              component: worker
      ports:
        - protocol: TCP
          port: 8080
{{- if not (eq .Values.reportRunner.enabled false) }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "specify7.fullname" . }}-report-runner-internal
  labels:
    {{- include "specify7.labels" . | nindent 4 }}
    component: report-runner
spec:
  podSelector:
    matchLabels:
      {{- include "specify7.selectorLabels" . | nindent 6 }}
      component: report-runner
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "specify7.selectorLabels" . | nindent 14 }}
              component: backend
      ports:
        - protocol: TCP
          port: 8080
{{- end }}
{{- if .Values.migrationHarness.enabled }}
