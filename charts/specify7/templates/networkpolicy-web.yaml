{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "specify7.fullname" . }}-backend-web
  labels:
    {{- include "specify7.labels" . | nindent 4 }}
    component: backend
spec:
  podSelector:
    matchLabels:
      {{- include "specify7.selectorLabels" . | nindent 6 }}
      component: backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- if .Values.networkPolicy.allowAllNamespaces }}
        - namespaceSelector: {}
        {{- else if .Values.networkPolicy.allowedNamespaceNames }}
        {{- range .Values.networkPolicy.allowedNamespaceNames }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
        {{- end }}
        {{- else }}
        - podSelector: {}
        {{- end }}
      ports:
        - protocol: TCP
          port: 8000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "specify7.fullname" . }}-static-web
  labels:
    {{- include "specify7.labels" . | nindent 4 }}
    component: static
spec:
  podSelector:
    matchLabels:
      {{- include "specify7.selectorLabels" . | nindent 6 }}
      component: static
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- if .Values.networkPolicy.allowAllNamespaces }}
        - namespaceSelector: {}
        {{- else if .Values.networkPolicy.allowedNamespaceNames }}
        {{- range .Values.networkPolicy.allowedNamespaceNames }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
        {{- end }}
        {{- else }}
        - podSelector: {}
        {{- end }}
      ports:
        - protocol: TCP
          port: 80
