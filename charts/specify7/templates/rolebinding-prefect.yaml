{{- if and .Values.prefect.enabled .Values.prefect.worker.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "specify7.fullname" . }}-prefect-worker
  labels:
    {{- include "specify7.labels" . | nindent 4 }}
    component: prefect-worker
subjects:
  - kind: ServiceAccount
    name: {{ include "specify7.fullname" . }}-prefect-worker
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "specify7.fullname" . }}-prefect-worker
  apiGroup: rbac.authorization.k8s.io
{{- end }}
