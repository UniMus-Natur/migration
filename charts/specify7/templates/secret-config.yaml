apiVersion: v1
kind: Secret
metadata:
  name: {{ include "specify7.fullname" . }}-config
  labels:
    {{- include "specify7.labels" . | nindent 4 }}
type: Opaque
stringData:
  local_specify_settings.py: |
    # Generated by Helm — env vars (from secrets.existingSecret) override these defaults.
    import os

    DATABASE_NAME = os.environ.get('DATABASE_NAME', os.environ.get('DB_NAME', '{{ .Values.mariadb.auth.database }}'))
    {{- if .Values.mariadb.enabled }}
    DATABASE_HOST = '{{ .Release.Name }}-mariadb'
    {{- else }}
    DATABASE_HOST = os.environ.get('DB_HOST', '{{ .Values.specify.database.host }}')
    {{- end }}
    DATABASE_PORT = int(os.environ.get('DB_PORT', '{{ .Values.specify.database.port }}'))

    MASTER_NAME = os.environ.get('MASTER_NAME', os.environ.get('DB_USER', '{{ .Values.mariadb.auth.username }}'))
    MASTER_PASSWORD = os.environ.get('MASTER_PASSWORD', os.environ.get('DB_PASSWORD', ''))

    APP_USER_NAME = os.environ.get('APP_USER_NAME', MASTER_NAME)
    APP_USER_PASSWORD = os.environ.get('APP_USER_PASSWORD', MASTER_PASSWORD)

    REDIS_HOST = os.environ.get('REDIS_HOST', '{{ include "specify7.redisHost" . }}')
    CELERY_BROKER_URL = os.environ.get('CELERY_BROKER_URL', f'redis://{REDIS_HOST}/0')
    CELERY_RESULT_BACKEND = os.environ.get('CELERY_RESULT_BACKEND', f'redis://{REDIS_HOST}/1')
    # Must match the worker queue (-Q "$DATABASE_NAME"); Celery defaults to "celery" otherwise.
    CELERY_TASK_DEFAULT_QUEUE = os.environ.get('CELERY_TASK_QUEUE', DATABASE_NAME)

    SECRET_KEY = os.environ.get('SECRET_KEY', '{{ .Values.specify.secretKey }}')
    WEB_ATTACHMENT_KEY = os.environ.get(
        'ATTACHMENT_KEY',
        os.environ.get('ASSET_SERVER_KEY', '{{ .Values.specify.attachmentKey }}'),
    )
    # Specify7 attachment_gw fetches this URL at startup to discover read/write/delete endpoints.
    # Override with ASSET_SERVER_URL in your Secret when the asset server is not in-cluster.
    WEB_ATTACHMENT_URL = os.environ.get(
        'ASSET_SERVER_URL',
        'http://{{ include "specify7.fullname" . }}-asset-server/web_asset_store.xml',
    )

    {{- if not (eq .Values.reportRunner.enabled false) }}
    # Specify7 backend forwards JasperReports to this in-cluster service.
    # Override with REPORT_RUNNER_HOST / REPORT_RUNNER_PORT in your Secret when needed.
    REPORT_RUNNER_HOST = os.environ.get(
        'REPORT_RUNNER_HOST',
        '{{ include "specify7.fullname" . }}-report-runner',
    )
    REPORT_RUNNER_PORT = os.environ.get(
        'REPORT_RUNNER_PORT',
        '{{ .Values.reportRunner.service.port | default 80 }}',
    )
    {{- else }}
    REPORT_RUNNER_HOST = os.environ.get('REPORT_RUNNER_HOST', '')
    REPORT_RUNNER_PORT = os.environ.get('REPORT_RUNNER_PORT', '')
    {{- end }}

    _debug_env = os.environ.get('DEBUG', '').lower()
    DEBUG = (
        _debug_env in ('1', 'true', 'yes') if _debug_env
        else {{ .Values.specify.debug | ternary "True" "False" }}
    )
    ALLOWED_HOSTS = {{ include "specify7.allowedHosts" . }}
    CSRF_TRUSTED_ORIGINS = {{ include "specify7.csrfTrustedOrigins" . }}
    {{- if and .Values.ingress.enabled .Values.ingress.tls }}
    # TLS terminates at ingress; backend sees HTTP. Required for OAuth redirect_uri (https://…).
    SECURE_PROXY_SSL_HEADER = ('HTTP_X_FORWARDED_PROTO', 'https')
    USE_X_FORWARDED_HOST = True
    {{- end }}

    OAUTH_LOGIN_PROVIDERS = {
    {{- range $key, $provider := .Values.specify.oauth.providers }}
    {{- if $provider.enabled }}
        "{{ $key }}": {
            "title": {{ $provider.title | quote }},
            "client_id": os.environ.get({{ $provider.clientIdEnv | quote }}, ""),
            "client_secret": os.environ.get({{ $provider.clientSecretEnv | quote }}, ""),
            "config": {{ $provider.config | quote }},
            "scope": {{ $provider.scope | quote }},
        },
    {{- end }}
    {{- end }}
    }

    STATIC_ROOT = '/volumes/static-files'

  secret_key.py: |
    import os
    SECRET_KEY = os.environ.get('SECRET_KEY', '{{ .Values.specify.secretKey }}')

  debug.py: |
    import os
    _debug_env = os.environ.get('DEBUG', '').lower()
    DEBUG = (
        _debug_env in ('1', 'true', 'yes') if _debug_env
        else {{ .Values.specify.debug | ternary "True" "False" }}
    )
