{{- if .Values.migrationHarness.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "specify7.fullname" . }}-migration-harness
  labels:
    {{- include "specify7.labels" . | nindent 4 }}
    component: migration-harness
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.migrationHarness.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "specify7.selectorLabels" . | nindent 4 }}
    component: migration-harness
{{- end }}
