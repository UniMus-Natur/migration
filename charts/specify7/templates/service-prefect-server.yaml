{{- if and .Values.prefect.enabled .Values.prefect.server.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "specify7.fullname" . }}-prefect-server
  labels:
    {{- include "specify7.labels" . | nindent 4 }}
    component: prefect-server
spec:
  type: ClusterIP
  ports:
    - port: 4200
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "specify7.selectorLabels" . | nindent 4 }}
    component: prefect-server
{{- end }}
