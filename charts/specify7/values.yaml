# Default values for specify7.

image:
  repository: specifyconsortium/specify7-service
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "v0.1.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# Backend probes: entrypoint runs DB setup + run_key_migration_functions before
# gunicorn binds :8000, which can take several minutes after MariaDB restarts.
backend:
  startupProbe:
    tcpSocket:
      port: http
    periodSeconds: 10
    failureThreshold: 36
  readinessProbe:
    tcpSocket:
      port: http
    periodSeconds: 10
    failureThreshold: 3
  livenessProbe:
    tcpSocket:
      port: http
    periodSeconds: 30
    failureThreshold: 3

# Infrastructure image defaults.
# Bitnami removed all images from public.ecr.aws/bitnami on 2026-06-10. The
# bitnamilegacy/* repos on Docker Hub are drop-in replacements for the Bitnami
# Helm subcharts and preserve the on-disk layout under existing PVCs.
# Mirror to your own registry with scripts/mirror-infra-images.sh for long-term
# availability, then set global.imageRegistry and update repositories below.
global:
  imageRegistry: docker.io

# Init container image for chown on shared volumes (Specify7 pods only; not MariaDB/Redis).
specifyVolumePermissions:
  image: docker.io/library/debian:bookworm-slim

# Static file server (nginx sidecar)
static:
  nginx:
    image: docker.io/library/nginx:1.27-alpine

# Persistence for Shared Assets (Static files, Webpack output)
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteMany
  size: 5Gi
  # If defined, use this existing PersistentVolumeClaim
  existingClaim: ""
  # If defined, all data will be stored under this subpath within the volume
  mainSubPath: ""

# Secret Management
#
# Credentials flow:
#   mariadb.auth.*          → MariaDB subchart creates the DB user/password.
#   secret-config.yaml      → Helm-generated Python settings with env-var overrides.
#   secrets.existingSecret  → Optional K8s Secret injected as env vars into all pods.
#
# Quick start with a .env file:
#   kubectl create secret generic my-app-secret --from-env-file=.env
#   Then set:
#     secrets.existingSecret: my-app-secret
#     mariadb.auth.existingSecret: my-app-secret
secrets:
  existingSecret: ""

# Specify7 Application Settings
#
# Database credentials are NOT duplicated here — they live under mariadb.auth
# and are referenced directly from the templates.  The fields below cover only
# the non-database application config.
specify:
  database:
    host: ""   # auto-set to <release>-mariadb when mariadb.enabled=true
    port: 3306
  secretKey: "change-me-in-production"
  attachmentKey: "change-me"
  debug: true
  # When ingress.enabled=true, ALLOWED_HOSTS and CSRF_TRUSTED_ORIGINS are
  # derived from ingress.hosts (plus any extras listed here).
  allowedHosts:
    - "*"
  csrfTrustedOrigins:
    - "https://*"
    - "http://*"
  # OpenID Connect SSO (Feide, Google, etc.). Specify uses OAUTH_LOGIN_PROVIDERS;
  # credentials are read from env vars named below and injected via secrets.existingSecret.
  oauth:
    providers:
      feide:
        enabled: false
        title: Feide
        config: https://auth.dataporten.no
        scope: openid profile email
        clientIdEnv: FEIDE_OIDC_CLIENT_ID
        clientSecretEnv: FEIDE_OIDC_CLIENT_SECRET

# Asset Server Configuration
assetServer:
  image:
    repository: specifyconsortium/specify-asset-service
    pullPolicy: IfNotPresent
    tag: "" # defaults to latest if not set, or specific version
  service:
    port: 80
  resources: {}

# Report Runner Configuration
reportRunner:
  image:
    repository: specifyconsortium/report-runner
    pullPolicy: IfNotPresent
    tag: ""
  service:
    port: 80
  resources: {}

# Redis Sub-chart Configuration (Bitnami)
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false # simplistic for internal usage, valid would be true + secret management
  master:
    persistence:
      enabled: false
      # Redis is used as a broker/cache here, persistence might not be strictly needed for this use case
      # or should be enabled for reliability. Keeping false for simplicity/dev.
  image:
    registry: docker.io
    repository: bitnamilegacy/redis
    tag: 7.2.4-debian-12-r9
  volumePermissions:
    enabled: true
    image:
      registry: docker.io
      repository: library/debian
      tag: bookworm-slim

# MariaDB Sub-chart (Bitnami)
#
# These are the single source of truth for database credentials.
# secret-config.yaml references mariadb.auth.* directly so there is no
# duplication.  When using an existingSecret the Secret must contain keys
# "mariadb-root-password" and "mariadb-password" (Bitnami's fixed names).
mariadb:
  enabled: true
  auth:
    database: "specify"
    username: "bn_specify"
    password: "password"
    rootPassword: "root-password"
    existingSecret: ""
  image:
    registry: docker.io
    repository: bitnamilegacy/mariadb
    tag: 10.6.12-debian-11-r16
  volumePermissions:
    enabled: true
    image:
      registry: docker.io
      repository: library/debian
      tag: bookworm-slim
  primary:
    persistence:
      enabled: true
      existingClaim: ""
      subPath: ""
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi

# Prefect Configuration
prefect:
  enabled: true
  image:
    repository: prefecthq/prefect
    tag: "3.6.20-python3.12"
    pullPolicy: IfNotPresent

  server:
    enabled: true
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi

  # Optional in-cluster worker for rapid development.
  # This worker runs flows as "process" jobs in a long-lived pod,
  # so you can sync code into the pod and test without rebuilding images.
  devWorker:
    enabled: true
    workPool: "dev-process"
    image:
      repository: ghcr.io/unimus-natur/migration
      tag: "latest"
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi

# App network policies
networkPolicy:
  # Enable policies that permit web ingress to backend/static pods.
  enabled: true
  # If true, allow ingress from any namespace.
  allowAllNamespaces: true
  # If allowAllNamespaces=false, allow ingress only from these namespace names.
  # Example: ["ingress-nginx"]
  allowedNamespaceNames: []

# Migration Harness (public token-protected compare UI)
migrationHarness:
  enabled: false
  image:
    repository: ghcr.io/unimus-natur/migration-harness
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    port: 8088
  basePath: /migration-harness
  defaultCollection: O-V
  defaultOracleEnv: prod
  # Set HARNESS_TOKEN via secrets.existingSecret.
  # Example key in secret: HARNESS_TOKEN=your-shared-token
  resources: {}
