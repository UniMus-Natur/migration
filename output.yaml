    spec:
      initContainers:
        - name: volume-permissions
          image: public.ecr.aws/bitnami/bitnami-shell:11-debian-11-r102
          command: ["/bin/bash", "-c"]
          args:
            - |
              chown -R 999:999 /home/specify/attachments
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: attachments
              mountPath: /home/specify/attachments
      containers:
        - name: asset-server
          image: "specifyconsortium/specify-asset-service:latest"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: SERVER_NAME
              value: "0.0.0.0" # or use actual hostname if needed, but 0.0.0.0 usually safe for binding
