    # Generated by Helm
    import os
    
    # Generated by Helm
    DATABASE_NAME = os.environ.get('DATABASE_NAME', 'specify')
    DATABASE_HOST = 'test-mariadb'
    DATABASE_PORT = int(os.environ.get('DATABASE_PORT', 3306))
    
    MASTER_NAME = os.environ.get('MASTER_NAME', 'bn_specify')
    MASTER_PASSWORD = os.environ.get('MASTER_PASSWORD', 'password')
    
    # Specify uses the same user for app access usually? Or separate? 
    # Standard charts often reuse master creds for simplicity or have separate app user.
    # We'll map APP_USER to the same env vars or defaults for now.
