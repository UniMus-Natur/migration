              value: "80"
            - name: ATTACHMENT_KEY
              value: "change-me"
            - name: DEBUG_MODE
              value: "false"
          volumeMounts:
            - name: attachments
              mountPath: /home/specify/attachments
          resources:
            {}
      volumes:
        - name: attachments
          persistentVolumeClaim:
            claimName: test-specify7-attachments
