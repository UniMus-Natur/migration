    APP_USER_PASSWORD = os.environ.get('APP_USER_PASSWORD', 'password')
    
    SECRET_KEY = os.environ.get('SECRET_KEY', 'change-me-in-production')
    WEB_ATTACHMENT_KEY = os.environ.get('WEB_ATTACHMENT_KEY', 'change-me')
    
    DEBUG = True
    
    # Static files location (matches Nginx & InitContainer paths)
    STATIC_ROOT = '/volumes/static-files'

