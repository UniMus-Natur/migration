# prefect.yaml
name: migration
prefect-version: 3.0.0

# build section allows you to manage and build docker images
build: null

# push section allows you to manage if and how this project is uploaded to remote locations
push: null

# pull section allows you to provide instructions for cloning this project in remote locations
pull:
  - prefect.deployments.steps.git_clone:
      id: clone-step
      repository: https://github.com/UniMus-Natur/migration.git
      branch: dev
      include_submodules: true
  - prefect.deployments.steps.set_working_directory:
      directory: "{{ clone-step.directory }}"

# the deployments section allows you to provide configuration for deploying flows
deployments:
  - name: infrastructure-prod-check-dev
    version: 1.0.0
    tags: ["oracle", "mariadb", "s3", "prod", "dev"]
    description: "Fast in-cluster Prod infrastructure connectivity checks (Oracle, MariaDB, S3)"
    entrypoint: flows/test_infrastructure.py:infrastructure_prod_check_flow
    work_pool:
      name: dev-process
      work_queue_name: default

  - name: oracle-schema-snapshot-dev
    version: 1.0.0
    tags: ["oracle", "prod", "schema", "dev"]
    description: "Extract Oracle PROD schema metadata and upload JSON/CSV artifacts to S3"
    entrypoint: flows/oracle_schema_snapshot.py:oracle_schema_snapshot_flow
    work_pool:
      name: dev-process
      work_queue_name: default

  - name: oracle-feide-field-profile-dev
    version: 1.0.0
    tags: ["oracle", "prod", "feide", "exploration", "dev"]
    description: "Profile USD_METADATA.BRUKARAR.FEIDE and upload anonymized aggregates to S3"
    entrypoint: flows/oracle_feide_field_profile.py:oracle_feide_field_profile_flow
    work_pool:
      name: dev-process
      work_queue_name: default

  - name: migrate-users-dev
    version: 1.0.0
    tags: ["oracle", "specify", "users", "migration", "dev"]
    description: "Phase 1.4: Migrate MUSIT application users (BRUKARAR/GRUPPE) to Specify SpecifyUser + Agent"
    entrypoint: flows/migrate_users.py:migrate_users_flow
    parameters:
      oracle_env: "PROD"
      dry_run: true
    work_pool:
      name: dev-process
      work_queue_name: default

  - name: migrate-musit-agents-dev
    version: 1.0.0
    tags: ["oracle", "specify", "agents", "migration", "dev"]
    description: "Phase 1.1: Migrate MUSIT ACTOR+PERSON_NAME (botany/entomology) to Specify Agent"
    entrypoint: flows/migrate_musit_agents.py:migrate_musit_agents_flow
    parameters:
      oracle_env: "PROD"
      dry_run: true
      musit_schemas:
        - MUSIT_BOTANIKK_FELLES
        - MUSIT_ZOOLOGI_ENTOMOLOGI
    work_pool:
      name: dev-process
      work_queue_name: default

  - name: sync-specify-structure-dev
    version: 1.0.0
    tags: ["specify", "structure", "staging", "dev"]
    description: "Post-bootstrap: create missing divisions/disciplines/collections from YAML (idempotent)"
    entrypoint: flows/sync_specify_structure.py:sync_specify_structure_flow
    parameters:
      config_path: "config/specify_structure/unimus_natur.yaml"
      dry_run: true
    work_pool:
      name: dev-process
      work_queue_name: default

  - name: nortaxa-discipline-trees-dev
    version: 1.0.0
    tags: ["nortaxa", "taxonomy", "dwca", "dev"]
    description: "Download Artsnavnebase NorTaxa DwC-A; slice taxon.txt per Specify Discipline (ORM + hard-coded roots)"
    entrypoint: flows/nortaxa_discipline_trees.py:nortaxa_discipline_trees_flow
    parameters:
      download: true
      keep_unpack_dir: false
      dry_run: true
    work_pool:
      name: dev-process
      work_queue_name: default
