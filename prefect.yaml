# prefect.yaml
name: migration
prefect-version: 3.0.0

# build section allows you to manage and build docker images
build: null

# push section allows you to manage if and how this project is uploaded to remote locations
push: null

# pull section allows you to provide instructions for cloning this project in remote locations
pull:
  - prefect.deployments.steps.git_clone:
      id: clone-step
      repository: https://github.com/UniMus-Natur/migration.git
      branch: dev
      include_submodules: true
  - prefect.deployments.steps.set_working_directory:
      directory: "{{ clone-step.directory }}"

# the deployments section allows you to provide configuration for deploying flows
deployments:
  - name: oracle-connectivity-test-dev
    version: 1.0.0
    tags: ["oracle", "test", "dev"]
    description: "Fast in-cluster Oracle TEST connectivity check"
    entrypoint: flows/test_oracle.py:oracle_connectivity_test_flow
    work_pool:
      name: dev-process
      work_queue_name: default

  - name: oracle-connectivity-prod-dev
    version: 1.0.0
    tags: ["oracle", "prod", "dev"]
    description: "Fast in-cluster Oracle PROD connectivity check"
    entrypoint: flows/test_oracle.py:oracle_connectivity_prod_flow
    work_pool:
      name: dev-process
      work_queue_name: default
